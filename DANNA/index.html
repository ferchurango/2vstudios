<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>Invitacion de 15 anos | Danna Gabriela</title>
      <meta name="description" content="Invitacion digital de 15 anos para celular, lista para compartir por WhatsApp." />
      <meta name="theme-color" content="#c98d9e" />
      <meta property="og:type" content="website" />
      <meta property="og:title" content="Invitacion de 15 anos | Sofia" />
      <meta property="og:description" content="Desliza para ver todos los detalles de esta noche especial." />
      <meta property="og:image" content="assets/img/preview.png" />
      <meta property="og:locale" content="es_CO" />
      <link rel="icon" href="assets/img/icons/calendar.png" type="image/png" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="css/styles.css" />
   </head>
   <body>
      <canvas id="particles-canvas" aria-hidden="true"></canvas>
      <audio id="bgMusic" autoplay loop playsinline preload="auto">
         <source src="assets/audio/musica-demo.wav" type="audio/wav" />
         Tu navegador no soporta el audio en esta invitacion.
      </audio>
      <div class="fixed-gif fixed-gif-top" aria-hidden="true"><img src="assets/gif/top-banner.gif" alt="" /></div>
      <div class="fixed-gif fixed-gif-bottom" aria-hidden="true"><img src="assets/gif/bottom-banner.gif" alt="" /></div>
      <button class="music-toggle" id="musicToggle" type="button" aria-label="Encender o apagar musica">
      <img id="musicIcon" src="assets/img/icons/music-on.png" alt="" />
      <span id="musicText">Musica</span>
      </button>
      <main class="story">
         <section class="story-section" id="inicio">
  <article class="story-card reveal">

    <video
      class="card-bg card-video"
      data-parallax="0.18"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto"
      poster="assets/img/fondos/bloque-01-portada.png"
    >
      <source src="assets/img/fondos/VIDEO%20DANNA.mp4" type="video/mp4" />
    </video>

    <img
      class="hero-overlay-image"
      src="assets/img/fondos/bloque-01-portada.png"
      alt=""
      aria-hidden="true"
    >

    <div class="card-shade card-shade-hero"></div>

    <div class="card-content hero-only">
      <div class="countdown-box">
        <div class="countdown-grid" aria-label="Cuenta regresiva para el evento"></div>
        <p class="event-date"><br></p>
      </div>

      <button class="scroll-cue" id="scrollCue" type="button" aria-label="Bajar para ver mas">
        <img src="assets/img/icons/arrow-down.png" alt="">
      </button>
    </div>

  </article>
</section>
         <section class="story-section" id="mensaje">
            <article class="story-card reveal">
               <div class="card-bg" data-parallax="0.14" style="background-image: url('assets/img/fondos/bloque-02-invitacion.png')"></div>
               <div class="card-shade"></div>
               <div class="card-content hero-only">
                  <div class="countdown-box">
                     <div class="countdown-grid" aria-label="Cuenta regresiva para el evento">
                        <div class="textoconteo countdown-item"><span id="days">00</span><small>dias</small></div>
                        <div class="textoconteo countdown-item"><span id="hours">00</span><small>horas</small></div>
                        <div class="textoconteo countdown-item"><span id="minutes">00</span><small>min</small></div>
                        <div class="textoconteo countdown-item"><span id="seconds">00</span><small>seg</small></div>
                     </div>
                     <p class="event-date"> <br>  </p>
                  </div>
               </div>
               <div class="card-content centered-message">
                  <p class="small-kicker"> </p>
                  <h2 class="script-title"> </h2>
                  <p class="message-copy"> </p>
               </div>
            </article>
         </section>
         <section class="story-section" id="Lugar">
            <article class="story-card reveal">
               <div class="card-bg" data-parallax="0.14" style="background-image: url('assets/img/fondos/bloque-03-mosaico.png')"></div>
               <div class="card-shade"></div>
               <div class="card-content hero-only">
                  <a class="map-link" href="https://maps.app.goo.gl/YTWZqYU6fZ69Hs1CA" target="_blank" rel="noopener noreferrer">
                  <img class="section-icon2" src="assets/img/icons/map-pin.png" alt="Ver ubicación">
                  </a>
               </div>
               <div class="card-content centered-message">
                  <p class="small-kicker"></p>
                  <h2 class="script-title"></h2>
                  <p class="message-copy"></p>
               </div>
            </article>
         </section>
         <section class="story-section" id="mosaico">
            <article class="story-card reveal">
               <div class="card-bg" data-parallax="0.12" style="background-image: url('assets/img/fondos/bloque-04-fecha.png')"></div>
               <div class="card-shade"></div>
               <div class="card-content">
                  <div class="mosaic-grid">
                     <img src="assets/img/fotos/mosaico-1.png" alt="Foto 1 del mosaico" />
                     <img src="assets/img/fotos/mosaico-2.png" alt="Foto 2 del mosaico" />
                     <img src="assets/img/fotos/mosaico-3.png" alt="Foto 3 del mosaico" />
                     <img src="assets/img/fotos/mosaico-4.png" alt="Foto 4 del mosaico" />
                     <img src="assets/img/fotos/mosaico-5.png" alt="Foto 5 del mosaico" />
                     <img src="assets/img/fotos/mosaico-6.png" alt="Foto 6 del mosaico" />
                  </div>
               </div>
            </article>
         </section>
         <section class="story-section" id="fecha">
            <article class="story-card reveal">
               <div class="card-bg" data-parallax="0.12" style="background-image: url('assets/img/fondos/bloque-04-vestuario.png')"></div>
               <div class="card-shade"></div>
               <div class="card-content detail-stack center-stack">
                  <p class="small-kicker"></p>
                  <div class="calendar-month"></div>
                  <div class="calendar-number script-title"></div>
                  <p class="detail-copy"></p>
               </div>
            </article>
         </section>
         <section class="story-section" id="confirmacion">
            <article class="story-card reveal">
               <div class="card-bg" data-parallax="0.10" style="background-image: url('assets/img/fondos/bloque-04-asistencia.png')"></div>
               <div class="card-shade"></div>
               <div class="card-content card-form">
                  <img class="section-icon" src="assets/img/icons/whatsapp.png" alt="" />
                  <p class="small-kicker">Confirmación</p>
                  <h2 class="script-title">Confirma tu asistencia</h2>
                  <form id="rsvpForm" class="rsvp-form">
                     <label><span>Tu nombre</span><input id="guestName" name="guestName" type="text" placeholder="Escribe tu nombre" required /></label>
                     <div class="double-fields">
                        <label><span>Asistentes</span><input id="guestCount" name="guestCount" type="number" min="1" max="10" value="1" required /></label>
                        <label><span>Celular</span><input id="guestPhone" name="guestPhone" type="tel" placeholder="3001234567" /></label>
                     </div>
                     <label><span>Mensaje</span><textarea id="guestMessage" name="guestMessage" rows="3" placeholder="Ejemplo: Confirmo mi asistencia con 2 personas"></textarea></label>
                     <button class="primary-button form-button" type="submit">Enviar por WhatsApp</button>
                     <p id="formStatus" class="form-status" aria-live="polite"></p>
                  </form>
               </div>
            </article>
         </section>
      </main>
      <script src="js/app.js" defer></script>
   </body>
</html>
